name: aidefense-demo

# All images selected for arm64 compatibility (cisco-web-1-arm is OCI Ampere A1).
# Internal services on the `demo` network; only caddy publishes 80/443.

x-netbox-common: &netbox-common
  image: netboxcommunity/netbox:${NETBOX_VERSION}
  environment:
    DB_NAME: ${POSTGRES_DB}
    DB_USER: ${POSTGRES_USER}
    DB_PASSWORD: ${POSTGRES_PASSWORD}
    DB_HOST: postgres
    DB_WAIT_DEBUG: "1"
    REDIS_HOST: redis-queue
    REDIS_PORT: "6379"
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    REDIS_DATABASE: "0"
    REDIS_SSL: "false"
    REDIS_CACHE_HOST: redis-cache
    REDIS_CACHE_PORT: "6379"
    REDIS_CACHE_PASSWORD: ${REDIS_CACHE_PASSWORD}
    REDIS_CACHE_DATABASE: "1"
    REDIS_CACHE_SSL: "false"
    SECRET_KEY: ${NETBOX_SECRET_KEY}
    ALLOWED_HOSTS: "netbox ${DEMO_DOMAIN} localhost 127.0.0.1"
    SUPERUSER_NAME: ${NETBOX_SUPERUSER_NAME}
    SUPERUSER_EMAIL: ${NETBOX_SUPERUSER_EMAIL}
    SUPERUSER_PASSWORD: ${NETBOX_SUPERUSER_PASSWORD}
    SUPERUSER_API_TOKEN: ${NETBOX_API_TOKEN}
    SKIP_SUPERUSER: "false"
  volumes:
    - netbox_media:/opt/netbox/netbox/media
    - netbox_reports:/opt/netbox/netbox/reports
    - netbox_scripts:/opt/netbox/netbox/scripts
  networks: [demo]
  restart: unless-stopped

services:
  caddy:
    image: caddy:2.10-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DEMO_DOMAIN: ${DEMO_DOMAIN}
    networks: [demo]
    restart: unless-stopped
    depends_on: [orchestrator]

  orchestrator:
    build:
      context: ../orchestrator
    environment:
      NIM_API_KEY: ${NIM_API_KEY}
      NIM_BASE_URL: ${NIM_BASE_URL}
      NIM_MODEL: ${NIM_MODEL}
      AI_DEFENSE_MCP_URL: http://ai-defense-mcp:8200
      NETBOX_MCP_URL: http://netbox-mcp:8210
      GATE_INPUT_ENABLED: ${GATE_INPUT_ENABLED}
      GATE_TOOL_ARGS_ENABLED: ${GATE_TOOL_ARGS_ENABLED}
      GATE_OUTPUT_ENABLED: ${GATE_OUTPUT_ENABLED}
      LOG_LEVEL: ${ORCHESTRATOR_LOG_LEVEL}
      # Tetragon JSONL log path inside this container (mounted read-only below)
      TETRAGON_LOG: /var/log/tetragon/tetragon.log
    volumes:
      - tetragon_logs:/var/log/tetragon:ro
    networks: [demo]
    restart: unless-stopped
    depends_on:
      ai-defense-mcp: {condition: service_healthy}
      netbox-mcp:     {condition: service_healthy}

  ai-defense-mcp:
    build:
      context: ../ai-defense-mcp
    environment:
      AI_DEFENSE_API_KEY: ${AI_DEFENSE_API_KEY}
      AI_DEFENSE_REGION: ${AI_DEFENSE_REGION:-us}
      AI_DEFENSE_MODE: ${AI_DEFENSE_MODE:-api}
      AI_DEFENSE_GATEWAY_URL: ${AI_DEFENSE_GATEWAY_URL:-}
      AI_DEFENSE_BASE_URL: ${AI_DEFENSE_BASE_URL:-}
      AI_DEFENSE_MODEL_LABEL: ${AI_DEFENSE_MODEL_LABEL}
      AI_DEFENSE_DEFAULT_RULES: ${AI_DEFENSE_DEFAULT_RULES:-}
    networks: [demo]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8200/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  netbox-mcp:
    build:
      context: ../netbox-mcp
    environment:
      NETBOX_URL: http://netbox:8080
      # SECURITY: read-only token (write_enabled=false on the NetBox side).
      # Even if the LLM proposes a destructive tool call AND it slips past the
      # AI Defense tool-args gate, NetBox itself returns 403 — defense at the
      # data layer, not just at the LLM layer.
      NETBOX_API_TOKEN: ${NETBOX_MCP_TOKEN_READONLY}
    networks: [demo]
    restart: unless-stopped
    depends_on:
      netbox: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8210/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  netbox:
    <<: *netbox-common
    depends_on:
      postgres:    {condition: service_healthy}
      redis-queue: {condition: service_healthy}
      redis-cache: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/login/"]
      interval: 20s
      timeout: 8s
      retries: 20
      start_period: 90s

  netbox-worker:
    <<: *netbox-common
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    depends_on:
      netbox: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "ps", "-eo", "comm", "|", "grep", "-q", "rqworker"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [demo]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-queue:
    image: redis:7-alpine
    command: ["sh", "-c", "redis-server --requirepass $$REDIS_PASSWORD --appendonly yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_queue_data:/data
    networks: [demo]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    command: ["sh", "-c", "redis-server --requirepass $$REDIS_CACHE_PASSWORD"]
    environment:
      REDIS_CACHE_PASSWORD: ${REDIS_CACHE_PASSWORD}
    networks: [demo]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_CACHE_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Tetragon (Cisco/Isovalent eBPF runtime observability) ───────────────────
  # Runs at host scope — privileged container, host PID namespace, host kernel
  # access. Emits one JSON event per kprobe/tracepoint hit to a shared volume
  # that the orchestrator tails for the UI's "runtime events" panel.
  # Cisco-on-Cisco: AI Defense at the model boundary, Tetragon at the kernel.
  tetragon:
    image: quay.io/cilium/tetragon:v1.7.0
    container_name: aidefense-demo-tetragon
    privileged: true
    pid: host
    network_mode: host
    cap_add: [SYS_ADMIN]
    volumes:
      - /sys/kernel/btf:/var/lib/tetragon/btf:ro
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /proc:/procHost:ro
      - ../tetragon/policies:/etc/tetragon/tetragon.tp.d:ro
      - tetragon_logs:/var/log/tetragon
    command:
      - /usr/bin/tetragon
      - --export-filename=/var/log/tetragon/tetragon.log
      - --export-allowlist={"event_set":["PROCESS_EXEC","PROCESS_KPROBE","PROCESS_TRACEPOINT"]}
      - --tracing-policy-dir=/etc/tetragon/tetragon.tp.d
      - --export-file-rotation-interval=24h
      - --export-file-max-size-mb=50
      - --export-file-max-backups=3
    restart: unless-stopped

  seed:
    build:
      context: ../seed
    environment:
      NETBOX_URL: http://netbox:8080
      NETBOX_API_TOKEN: ${NETBOX_API_TOKEN}
    networks: [demo]
    profiles: ["seed"]
    depends_on:
      netbox: {condition: service_healthy}

networks:
  demo:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_queue_data:
  netbox_media:
  netbox_reports:
  netbox_scripts:
  tetragon_logs:        # JSONL event stream — read by the orchestrator
